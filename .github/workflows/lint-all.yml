# Pythonのコードをlintします
name: lint-all
on:
  pull_request:
jobs:
  ruff:
    name: lint python code
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: uv sync
      - run: make lint
