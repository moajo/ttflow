name: 機能要望
description: 新しい機能や改善の提案
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        機能要望ありがとうございます。動機と提案内容をできるだけ具体的に書いてください。

  - type: textarea
    id: motivation
    attributes:
      label: 動機・解決したい課題
      description: なぜこの機能が必要か、どんな課題を解決したいか
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: 提案内容
      description: どんな機能やAPIを想定しているか。コード例があると理想的
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 検討した代替案
      description: 他のアプローチや回避策、既存機能の組み合わせで実現できないか等

  - type: textarea
    id: extra
    attributes:
      label: その他補足
      description: 参考リンク、関連issue、想定ユースケースなど
